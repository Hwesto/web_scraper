name: Chile weekly blueberry exports

# Fetches weekly Chile->UK fresh-blueberry exports from the Aduana DUS records on
# datos.gob.cl. Runs on GitHub-hosted runners (clean egress) because that host is
# TLS-blocked from the Claude Code sandbox proxy -- this workflow IS the access
# method for the weekly-resolution origin data.
#
# First: run manually with mode=inspect (workflow_dispatch) and read the log to
# pin column names + the UK country code in scripts/fetch_chile_weekly_exports.py.
# Then the weekly schedule (collect) keeps the series current; use the years input
# to backfill history.

on:
  # Pushing this workflow/script to the branch auto-runs it in INSPECT mode --
  # the quickest way to get the first sample/layout without touching main.
  push:
    paths:
      - ".github/workflows/chile-weekly-exports.yml"
      - "scripts/fetch_chile_weekly_exports.py"
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (log layout) or collect (aggregate + commit)"
        type: choice
        options: [inspect, collect]
        default: inspect
      years:
        description: "comma-separated years to process (collect/backfill)"
        default: "2024,2025,2026"
      month_token:
        description: "month name for inspect, e.g. enero"
        default: "enero"
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y unar
          pip install requests pandas openpyxl scipy matplotlib pyarrow beautifulsoup4 lxml
      - name: Set cadence (mode + monthly gate)
        run: |
          # push/schedule -> collect; dispatch -> chosen mode (inspect|collect).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            MODE=collect
          fi
          echo "MODE=$MODE" >> "$GITHUB_ENV"
          # Lean cron: only HMRC/Trolley/DEFRA/ONS move week-to-week, so they run
          # every Monday. The annual (Comtrade/FAOSTAT) and deep-only sources are
          # slow-changing — refresh them in the month's FIRST week (first Monday),
          # or on any manual dispatch. Saves the weekly 34 MB FAOSTAT pull etc.
          if [ "$(date +%d)" -le 7 ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "MONTHLY=true" >> "$GITHUB_ENV"
          else
            echo "MONTHLY=false" >> "$GITHUB_ENV"
          fi
          echo "YEARS=${{ github.event.inputs.years || '2025,2026' }}" >> "$GITHUB_ENV"
          echo "MONTH_TOKEN=${{ github.event.inputs.month_token || 'enero' }}" >> "$GITHUB_ENV"

      # ---- WEEKLY — the only sources that actually move week-to-week (core board) ----
      - name: Ingest weekly vintages — HMRC + re-exports, DEFRA, ONS, Trolley retail
        if: ${{ env.MODE == 'collect' }}
        run: python -m deep.pipeline ingest || echo "vintage ingest skipped"
      - name: Atlas wholesale — DEFRA per-fruit £/kg (apple, pear, plum, cherry, …) in one download
        if: ${{ env.MODE == 'collect' }}
        run: python -m deep.data.defra_price || echo "defra wholesale skipped"

      # ---- MONTHLY (first week) or manual — annual + deep-only sources ----
      - name: (monthly) Chile weekly export history — deep nowcast
        if: ${{ env.MONTHLY == 'true' }}
        run: |
          python scripts/fetch_chile_weekly_exports.py \
            --mode "${{ env.MODE }}" --years "${{ env.YEARS }}" \
            --month-token "${{ env.MONTH_TOKEN }}" || echo "chile fetch skipped"
      - name: (monthly) Blueberry world map — Comtrade global, FAOSTAT production, destinations
        if: ${{ env.MODE == 'collect' && env.MONTHLY == 'true' }}
        run: |
          python -m deep.market.comtrade_global || echo "global trade skipped"
          python -m deep.market.production || echo "global production skipped"
          python -m core.player_exports || echo "player destinations skipped"
      - name: (monthly) Other fruits — HMRC + Comtrade + FAOSTAT + destinations per HS code
        if: ${{ env.MODE == 'collect' && env.MONTHLY == 'true' }}
        run: python -m core.fetch_fruit || echo "fruit fetch skipped"
      - name: (monthly) ONS retail price proxy — per-kg fruits (banana, mandarin, …) in one download
        if: ${{ env.MODE == 'collect' && env.MONTHLY == 'true' }}
        run: python -m deep.data.ons_price || echo "ons retail skipped"
      - name: (monthly) Deep-only economics — destinations, FOB prices, FX, SAG roster
        if: ${{ env.MODE == 'collect' && env.MONTHLY == 'true' }}
        run: |
          python -m deep.market.comtrade || echo "comtrade skipped"
          python -m deep.market.origin_prices || echo "origin prices skipped"
          python -m deep.market.fx || echo "fx skipped"
          python scripts/fetch_sag_china.py || echo "sag-china skipped"
      - name: Rebuild pages — ticker board (index) + deep dashboard (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: |
          python -m core.build_board || echo "board build skipped"
          python scripts/build_static_dashboard.py || echo "deep dashboard build skipped"
      - name: Commit data + dashboard (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly/ data/market/ data/vintages/ docs/ || true
          git diff --staged --quiet || git commit -m "data+pages: refresh weekly exports & dashboard"
          git push
