name: Chile weekly blueberry exports

# Fetches weekly Chile->UK fresh-blueberry exports from the Aduana DUS records on
# datos.gob.cl. Runs on GitHub-hosted runners (clean egress) because that host is
# TLS-blocked from the Claude Code sandbox proxy -- this workflow IS the access
# method for the weekly-resolution origin data.
#
# First: run manually with mode=inspect (workflow_dispatch) and read the log to
# pin column names + the UK country code in scripts/fetch_chile_weekly_exports.py.
# Then the weekly schedule (collect) keeps the series current; use the years input
# to backfill history.

on:
  # Pushing this workflow/script to the branch auto-runs it in INSPECT mode --
  # the quickest way to get the first sample/layout without touching main.
  push:
    paths:
      - ".github/workflows/chile-weekly-exports.yml"
      - "scripts/fetch_chile_weekly_exports.py"
  workflow_dispatch:
    inputs:
      mode:
        description: "inspect (log layout) or collect (aggregate + commit)"
        type: choice
        options: [inspect, collect]
        default: inspect
      years:
        description: "comma-separated years to process (collect/backfill)"
        default: "2024,2025,2026"
      month_token:
        description: "month name for inspect, e.g. enero"
        default: "enero"
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get update && sudo apt-get install -y unar
          pip install requests pandas openpyxl scipy matplotlib pyarrow beautifulsoup4 lxml
      - name: Run collector
        run: |
          # Parser validated (run #3): push + schedule -> collect; dispatch -> chosen mode.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MODE="${{ github.event.inputs.mode }}"
          else
            MODE=collect
          fi
          echo "MODE=$MODE" >> "$GITHUB_ENV"
          # Full history (2018-2026) is backfilled + committed; the weekly run
          # only refreshes the active + prior season. Re-backfill via the years
          # input or by temporarily widening this default.
          YEARS="${{ github.event.inputs.years || '2025,2026' }}"
          echo "Running mode=$MODE years=$YEARS"
          python scripts/fetch_chile_weekly_exports.py \
            --mode "$MODE" --years "$YEARS" \
            --month-token "${{ github.event.inputs.month_token || 'enero' }}"
      - name: Refresh destination economics (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: python -m deep.market.comtrade || echo "comtrade refresh skipped"
      - name: Refresh per-origin export prices (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: python -m deep.market.origin_prices || echo "origin prices refresh skipped"
      - name: Refresh USD->GBP FX rate (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: python -m deep.market.fx || echo "fx refresh skipped"
      - name: Refresh SAG China orchard roster (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: python scripts/fetch_sag_china.py || echo "sag-china fetch skipped"
      - name: Ingest vintage sources — HMRC, DEFRA, ODEPA, ONS, retail (collect only)
        if: ${{ env.MODE == 'collect' }}
        # one pass over the registry (per-source try/except inside); brings the HMRC
        # anchor + DEFRA/ODEPA onto the weekly cadence, and refreshes ONS + retail too
        run: python -m deep.pipeline ingest || echo "vintage ingest skipped"
      - name: Rebuild pages — ticker board (index) + deep dashboard (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: |
          python -m core.build_board || echo "board build skipped"
          python scripts/build_static_dashboard.py || echo "deep dashboard build skipped"
      - name: Commit data + dashboard (collect only)
        if: ${{ env.MODE == 'collect' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly/ data/market/ data/vintages/ docs/ || true
          git diff --staged --quiet || git commit -m "data+pages: refresh weekly exports & dashboard"
          git push
